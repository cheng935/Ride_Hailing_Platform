spring.application.name=Ride_Hailing_Platform

# == MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/ride_hailing_platform?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# == JPA
# Entity
spring.jpa.hibernate.ddl-auto=update

# SQL
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

# Flyway config
spring.flyway.enabled=false

# JWT Configuration
jwt.secret=ride-hailing-platform-secret-key-for-jwt-token-generation-2024-very-long-key
jwt.expiration=86400000

